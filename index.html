<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>GNSS Tracker: Kalman vs Polynomial</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: monospace; background: #0a0f1e; overflow: hidden;
            touch-action: none; -webkit-user-select: none; user-select: none;
        }
        canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: block; }
        .panel {
            position: fixed; bottom: 12px; left: 12px; right: 12px; max-width: 300px;
            background: rgba(0,0,0,0.85); border-radius: 12px; padding: 10px 14px;
            font-size: 11px; z-index: 100; color: #e2e8f0; border-left: 3px solid #3b82f6;
        }
        .compare {
            position: fixed; top: 12px; left: 12px;
            background: rgba(20, 30, 45, 0.95); border-radius: 12px; padding: 8px 14px;
            font-size: 10px; z-index: 101; border-left: 3px solid #f97316; color: #f1f5f9;
        }
        .zoom-btns {
            position: fixed; right: 12px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 8px; z-index: 103;
        }
        .zoom-btns button {
            width: 40px; height: 40px; border-radius: 20px; border: 1px solid #3b82f6;
            background: rgba(0,0,0,0.85); color: #3b82f6; font-size: 20px;
            cursor: pointer; backdrop-filter: blur(4px); font-family: monospace;
        }
        .follow-btn {
            position: fixed; bottom: 12px; right: 12px;
            background: rgba(0,0,0,0.85); color: #3b82f6; padding: 8px 16px;
            border-radius: 20px; font-size: 12px; z-index: 103;
            border: 1px solid #3b82f6; cursor: pointer;
            font-family: monospace; backdrop-filter: blur(4px);
        }
        .follow-btn.active { background: #3b82f6; color: white; }
        .row { display: flex; justify-content: space-between; margin: 3px 0; }
        .badge { display: inline-block; width: 8px; height: 8px; border-radius: 8px; margin-right: 6px; }
        .blue { background: #3b82f6; } .red { background: #ef4444; }
        hr { margin: 6px 0; border-color: #475569; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="compare">
    <div><b>Экстраполяция +3s</b></div>
    <div class="row"><span><span class="badge blue"></span>Калман</span><span id="errKal">-- m</span></div>
    <div class="row"><span><span class="badge red"></span>Полином</span><span id="errPoly">-- m</span></div>
    <hr>
    <div class="row"><span>Разница:</span><span id="diffPred">-- m</span></div>
</div>

<div class="panel">
    <div><b id="coord">Waiting GPS...</b></div>
    <div class="row"><span>Скорость:</span><span id="speedVal">-- km/h</span></div>
    <div class="row"><span>Точность GPS:</span><span id="accVal">-- m</span></div>
    <div class="row"><span>Точек:</span><span id="ptCount">0</span></div>
</div>

<div class="zoom-btns">
    <button id="zoomIn">+</button>
    <button id="zoomOut">−</button>
</div>
<button class="follow-btn active" id="followBtn">📍 Следить</button>

<script>
(function(){
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let view = { lat: 59.9343, lon: 30.3351, zoom: 17 };
    let followMode = true, dragState = null;
    let currentPos = { lat: 59.9343, lon: 30.3351 };
    let predKal = null, predPoly = null;
    let kalman, historyPoints = [], logData = [], lastTime = null;
    const HORIZON = 3.0;
    
    function toScreen(lat, lon) {
        const s = Math.pow(2, view.zoom) * 1.5 * 111000;
        return {
            x: (lon - view.lon) * s * Math.cos(view.lat * Math.PI/180) + canvas.width/2,
            y: (view.lat - lat) * s + canvas.height/2
        };
    }
    
    class Kalman2D {
        constructor() {
            this.x = [0,0,0,0,0,0]; this.P = [1,1,0.5,0.5,0.2,0.2];
            this.Q = [0.01,0.01,0.5,0.5,0.3,0.3]; this.R = 1.0; this.ok = false;
        }
        predict(dt) {
            if(!this.ok||dt<=0)return;
            const d2=dt*dt/2;
            this.x[0]+=this.x[2]*dt+this.x[4]*d2; this.x[1]+=this.x[3]*dt+this.x[5]*d2;
            this.x[2]+=this.x[4]*dt; this.x[3]+=this.x[5]*dt;
            for(let i=0;i<6;i++)this.P[i]+=this.Q[i]*dt;
        }
        update(lat,lon,dt,spd,hdg) {
            if(!this.ok){this.x[0]=lat;this.x[1]=lon;if(spd&&hdg){this.x[2]=spd*Math.cos(hdg)/111111;this.x[3]=spd*Math.sin(hdg)/(111111*Math.cos(lat*Math.PI/180));}this.ok=true;return;}
            if(spd&&hdg&&dt>0.1){
                let vx=spd*Math.cos(hdg)/111111,vy=spd*Math.sin(hdg)/(111111*Math.cos(this.x[0]*Math.PI/180));
                let k=this.P[2]/(this.P[2]+0.5);this.x[2]+=k*(vx-this.x[2]);this.P[2]*=1-k;
                k=this.P[3]/(this.P[3]+0.5);this.x[3]+=k*(vy-this.x[3]);this.P[3]*=1-k;
                if(dt>0.5){this.x[4]=0.8*this.x[4]+0.2*(vx-this.x[2])/dt;this.x[5]=0.8*this.x[5]+0.2*(vy-this.x[3])/dt;}
            }
            let k0=this.P[0]/(this.P[0]+this.R);this.x[0]+=k0*(lat-this.x[0]);this.P[0]*=1-k0;
            let k1=this.P[1]/(this.P[1]+this.R);this.x[1]+=k1*(lon-this.x[1]);this.P[1]*=1-k1;
        }
        extrapolate(s){let d2=s*s/2;return{lat:this.x[0]+this.x[2]*s+this.x[4]*d2,lon:this.x[1]+this.x[3]*s+this.x[5]*d2};}
        get(){return{lat:this.x[0],lon:this.x[1]};}
    }
    
    function cramer2D(pts, t) {
        if(pts.length<2)return pts.length?pts[0].coord:0;
        if(pts.length===2){let s=(pts[1].coord-pts[0].coord)/(pts[1].t-pts[0].t);return pts[1].coord+s*t;}
        let s0=pts.length,s1=0,s2=0,s3=0,s4=0,sy=0,syt=0,syt2=0;
        for(let p of pts){let t2=p.t*p.t;let t3=t2*p.t;let t4=t3*p.t;s1+=p.t;s2+=t2;s3+=t3;s4+=t4;let y=p.coord;sy+=y;syt+=y*p.t;syt2+=y*t2;}
        let det=(a,b,c,d,e,f,g,h,i)=>a*(e*i-f*h)-b*(d*i-f*g)+c*(d*h-e*g);
        let D=det(s4,s3,s2,s3,s2,s1,s2,s1,s0);
        if(Math.abs(D)<1e-10){let l=pts[pts.length-1],f=pts[0];return l.coord+(l.coord-f.coord)/(l.t-f.t)*t;}
        let a=det(syt2,s3,s2,syt,s2,s1,sy,s1,s0)/D;
        let b=det(s4,syt2,s2,s3,syt,s1,s2,sy,s0)/D;
        let c=det(s4,s3,syt2,s3,s2,syt,s2,s1,sy)/D;
        return a*t*t+b*t+c;
    }
    
    function polyExtrapolate(h, now, hz=3) {
        if(h.length<2)return null;
        let r=h.slice(-12),lp=[],lo=[];
        for(let p of r){let dt=p.time-now;lp.push({t:dt,coord:p.lat});lo.push({t:dt,coord:p.lon});}
        return{lat:cramer2D(lp,hz),lon:cramer2D(lo,hz)};
    }
    
    function dist(l1,o1,l2,o2){let R=6371000,a=(l2-l1)*Math.PI/180,b=(o2-o1)*Math.PI/180;let c=Math.sin(a/2)**2+Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(b/2)**2;return R*2*Math.atan2(Math.sqrt(c),Math.sqrt(1-c));}
    
    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.strokeStyle="#1e293b";ctx.lineWidth=0.5;
        let gs=0.0005*Math.pow(2,15-view.zoom);
        for(let lo=Math.floor(view.lon/gs)*gs;lo<view.lon+0.01;lo+=gs){let a=toScreen(view.lat-0.02,lo),b=toScreen(view.lat+0.02,lo);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}
        for(let la=Math.floor(view.lat/gs)*gs;la<view.lat+0.01;la+=gs){let a=toScreen(la,view.lon-0.02),b=toScreen(la,view.lon+0.02);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}
        
        if(historyPoints.length>1){ctx.beginPath();ctx.strokeStyle="#3b82f6";ctx.lineWidth=2.5;let f=toScreen(historyPoints[0].lat,historyPoints[0].lon);ctx.moveTo(f.x,f.y);for(let i=1;i<historyPoints.length;i++){let p=toScreen(historyPoints[i].lat,historyPoints[i].lon);ctx.lineTo(p.x,p.y);}ctx.stroke();}
        if(currentPos&&predKal){ctx.beginPath();ctx.setLineDash([6,6]);ctx.strokeStyle="#60a5fa";ctx.lineWidth=2;let f=toScreen(currentPos.lat,currentPos.lon),t=toScreen(predKal.lat,predKal.lon);ctx.moveTo(f.x,f.y);ctx.lineTo(t.x,t.y);ctx.stroke();}
        if(currentPos&&predPoly){ctx.beginPath();ctx.setLineDash([4,8]);ctx.strokeStyle="#f87171";ctx.lineWidth=2;let f=toScreen(currentPos.lat,currentPos.lon),t=toScreen(predPoly.lat,predPoly.lon);ctx.moveTo(f.x,f.y);ctx.lineTo(t.x,t.y);ctx.stroke();}
        ctx.setLineDash([]);
        if(currentPos){let p=toScreen(currentPos.lat,currentPos.lon);ctx.beginPath();ctx.arc(p.x,p.y,7,0,6.28);ctx.fillStyle="#3b82f6";ctx.fill();ctx.beginPath();ctx.arc(p.x,p.y,3,0,6.28);ctx.fillStyle="white";ctx.fill();}
        if(predKal){let p=toScreen(predKal.lat,predKal.lon);ctx.beginPath();ctx.arc(p.x,p.y,6,0,6.28);ctx.fillStyle="rgba(59,130,246,0.6)";ctx.fill();}
        if(predPoly){let p=toScreen(predPoly.lat,predPoly.lon);ctx.beginPath();ctx.arc(p.x,p.y,6,0,6.28);ctx.fillStyle="rgba(239,68,68,0.6)";ctx.fill();}
    }
    
    // Zoom buttons
    document.getElementById('zoomIn').onclick = () => { view.zoom = Math.min(20, view.zoom+0.5); draw(); };
    document.getElementById('zoomOut').onclick = () => { view.zoom = Math.max(12, view.zoom-0.5); draw(); };
    
    // Follow button
    let fb = document.getElementById('followBtn');
    fb.onclick = () => { followMode = !followMode; fb.classList.toggle('active', followMode); if(followMode&&currentPos){view.lat=currentPos.lat;view.lon=currentPos.lon;draw();} };
    
    // Drag
    canvas.onpointerdown = e => { dragState = {x:e.clientX, y:e.clientY, lat:view.lat, lon:view.lon}; followMode=false; fb.classList.remove('active'); };
    canvas.onpointermove = e => { if(!dragState)return; let s=Math.pow(2,view.zoom)*1.5*111000; view.lat=dragState.lat+(dragState.y-e.clientY)/s; view.lon=dragState.lon-(dragState.x-e.clientX)/(s*Math.cos(view.lat*Math.PI/180)); draw(); };
    canvas.onpointerup = () => { dragState = null; };
    
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; draw(); }
    window.onresize = resize;
    resize();
    
    kalman = new Kalman2D();
    
    function onPosition(pos) {
        let {latitude:la,longitude:lo,speed:sp,heading:hd,accuracy:ac} = pos.coords;
        let now = pos.timestamp/1000, spd = sp||null, hdg = (hd&&spd>0.2)?hd*Math.PI/180:null;
        
        if(!lastTime){lastTime=now;kalman.update(la,lo,0.1,spd,hdg);currentPos=kalman.get();historyPoints.push({lat:currentPos.lat,lon:currentPos.lon,time:now});if(followMode){view.lat=currentPos.lat;view.lon=currentPos.lon;}draw();return;}
        let dt=now-lastTime;if(dt<=0.01)return;lastTime=now;
        kalman.predict(dt);kalman.update(la,lo,dt,spd,hdg);currentPos=kalman.get();
        historyPoints.push({lat:currentPos.lat,lon:currentPos.lon,time:now});if(historyPoints.length>50)historyPoints.shift();
        predKal=kalman.extrapolate(HORIZON);predPoly=historyPoints.length>=3?polyExtrapolate(historyPoints,now,HORIZON):null;
        
        let errK=null,errP=null,tt=now-HORIZON;
        for(let i=logData.length-1;i>=0;i--){let e=logData[i];if(Math.abs(new Date(e.time).getTime()/1000-tt)<0.5&&e.kalLat!=null){errK=dist(la,lo,e.kalLat,e.kalLon);if(e.polLat!=null)errP=dist(la,lo,e.polLat,e.polLon);break;}}
        document.getElementById('errKal').textContent=errK?errK.toFixed(1)+' m':'-- m';
        document.getElementById('errPoly').textContent=errP&&predPoly?errP.toFixed(1)+' m':'-- m';
        if(predKal&&predPoly)document.getElementById('diffPred').textContent=dist(predKal.lat,predKal.lon,predPoly.lat,predPoly.lon).toFixed(1)+' m';
        document.getElementById('coord').textContent=`${la.toFixed(6)}, ${lo.toFixed(6)}`;
        document.getElementById('speedVal').textContent=spd?(spd*3.6).toFixed(1)+' km/h':'--';
        document.getElementById('accVal').textContent=ac?ac.toFixed(1)+' m':'--';
        document.getElementById('ptCount').textContent=historyPoints.length;
        if(followMode){view.lat=currentPos.lat;view.lon=currentPos.lon;}
        draw();
        logData.push({time:new Date(now*1000).toISOString(),kalLat:predKal.lat,kalLon:predKal.lon,polLat:predPoly?.lat??null,polLon:predPoly?.lon??null});
        if(logData.length>200)logData.shift();
    }
    
    if(navigator.geolocation)navigator.geolocation.watchPosition(onPosition,()=>document.getElementById('coord').textContent='GPS error',{enableHighAccuracy:true,timeout:8000,maximumAge:0});
})();
</script>
</body>
</html>
