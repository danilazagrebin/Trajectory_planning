<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ГНСС Трекер + Экстраполяция</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { width: 100vw; height: 100vh; }
        #panel {
            position: fixed; bottom: 20px; left: 10px; right: 10px;
            background: rgba(0,0,0,0.85); color: #ffffff;
            padding: 12px 14px; border-radius: 10px;
            font-size: 14px; line-height: 1.6;
            z-index: 1000; max-width: 360px;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="panel">Поиск спутников...</div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>

        // ==================== 1. КАРТА ====================
        const map = L.map('map').setView([59.9343, 30.3351], 16);

        // Быстрые тайлы 2ГИС
        L.tileLayer('https://tile2.maps.2gis.com/tiles?x={x}&y={y}&z={z}', {
            maxZoom: 19
        }).addTo(map);

        const markerGPS   = L.circleMarker([0,0], {radius:7, color:'#2563eb', fillOpacity:1}).addTo(map);
        const markerPred  = L.circleMarker([0,0], {radius:7, color:'#ef4444', fillOpacity:0.4}).addTo(map);
        const linePredict = L.polyline([], {color:'#ef4444', weight:2, dashArray:'6,6'}).addTo(map);
        const lineHistory = L.polyline([], {color:'#2563eb', weight:3, opacity:0.8}).addTo(map);

        // Хранилище трека — не стирается
        const history = [];


        // ==================== 2. ФИЛЬТР КАЛМАНА ====================
        class Kalman {
            constructor() {
                this.lat = 0;
                this.lon = 0;
                this.vLat = 0;
                this.vLon = 0;
                this.P = 1;
                this.ok = false;
            }

            predict(dt) {
                if (!this.ok) return;
                this.lat += this.vLat * dt;
                this.lon += this.vLon * dt;
                this.P += 0.0000001 * dt;
            }

            update(gpsLat, gpsLon, dt) {
                if (!this.ok) {
                    this.lat = gpsLat;
                    this.lon = gpsLon;
                    this.ok = true;
                    return;
                }
                const newVLat = (gpsLat - this.lat) / dt;
                const newVLon = (gpsLon - this.lon) / dt;
                const R = 0.00001;
                const K = this.P / (this.P + R);
                this.lat += K * (gpsLat - this.lat);
                this.lon += K * (gpsLon - this.lon);
                this.P *= (1 - K);
                this.vLat = 0.7 * this.vLat + 0.3 * newVLat;
                this.vLon = 0.7 * this.vLon + 0.3 * newVLon;
            }

            extrapolate(seconds) {
                return [
                    this.lat + this.vLat * seconds,
                    this.lon + this.vLon * seconds
                ];
            }
        }

        const kf = new Kalman();
        let lastTime = null;


        // ==================== 3. ОБРАБОТКА ДАННЫХ ГНСС ====================
        function onPosition(pos) {
            const { latitude, longitude, speed, heading, accuracy } = pos.coords;
            const now = pos.timestamp / 1000;

            if (lastTime === null) {
                lastTime = now;
                kf.lat = latitude;
                kf.lon = longitude;
                kf.ok = true;
                map.setView([latitude, longitude], 18);
                markerGPS.setLatLng([latitude, longitude]);
                updatePanel(latitude, longitude, speed, accuracy, 0);
                return;
            }

            const dt = now - lastTime;
            if (dt <= 0) return;
            lastTime = now;

            if (speed && heading) {
                const rad = heading * Math.PI / 180;
                kf.vLat = 0.7 * kf.vLat + 0.3 * speed * Math.cos(rad) / 111111;
                kf.vLon = 0.7 * kf.vLon + 0.3 * speed * Math.sin(rad) / (111111 * Math.cos(latitude * Math.PI / 180));
            }

            kf.predict(dt);
            kf.update(latitude, longitude, dt);

            const [predLat, predLon] = kf.extrapolate(5);

            const dLatM = (predLat - kf.lat) * 111111;
            const dLonM = (predLon - kf.lon) * 111111 * Math.cos(kf.lat * Math.PI / 180);
            const dist = Math.sqrt(dLatM * dLatM + dLonM * dLonM);

            markerGPS.setLatLng([kf.lat, kf.lon]);
            markerPred.setLatLng([predLat, predLon]);

            // Добавляем точку в историю — никогда не стираем
            history.push([kf.lat, kf.lon]);
            lineHistory.setLatLngs(history);

            linePredict.setLatLngs([[kf.lat, kf.lon], [predLat, predLon]]);

            updatePanel(kf.lat, kf.lon, speed, accuracy, dist);
        }

        function onError(err) {
            document.getElementById('panel').innerHTML =
                'Нет сигнала ГНСС. Проверьте настройки геолокации и выйдите на открытое место.';
        }

        function updatePanel(lat, lon, speed, accuracy, dist) {
            const speedKph = speed ? (speed * 3.6).toFixed(1) : '--';
            const accStr   = accuracy ? accuracy.toFixed(1) : '--';
            const distStr  = dist.toFixed(1);

            document.getElementById('panel').innerHTML =
                `Координаты: ${lat.toFixed(6)}, ${lon.toFixed(6)}<br>` +
                `Скорость: ${speedKph} км/ч<br>` +
                `Точность: ${accStr} м<br>` +
                `Прогноз +5 сек: ${distStr} м`;
        }


        // ==================== 4. ЗАПУСК ====================
        navigator.geolocation.watchPosition(onPosition, onError, {
            enableHighAccuracy: true,
            timeout: 30000,
            maximumAge: 0
        });

    </script>
</body>
</html>
