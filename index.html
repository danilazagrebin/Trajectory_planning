<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GNSS Tracker: Kalman vs Polynomial</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: monospace; background: #0a0f1e; overflow: hidden; }
        canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #0f172a; display: block; }
        
        .panel {
            position: fixed; bottom: 12px; left: 12px; right: 12px; max-width: 320px;
            background: rgba(0,0,0,0.85); border-radius: 12px; padding: 10px 14px;
            font-size: 12px; z-index: 100; color: #e2e8f0; border-left: 3px solid #3b82f6;
        }
        .compare {
            position: fixed; top: 12px; left: 12px;
            background: rgba(0,0,0,0.8); border-radius: 12px; padding: 8px 14px;
            font-size: 11px; z-index: 101; min-width: 220px; border-left: 3px solid #f97316;
        }
        .btn {
            position: fixed; top: 12px; right: 12px;
            background: #1e293b; color: white; border: 1px solid #3b82f6;
            padding: 8px 16px; border-radius: 24px; font-size: 12px;
            cursor: pointer; z-index: 102; font-family: monospace;
        }
        .btn:active { background: #0f172a; }
        .row { display: flex; justify-content: space-between; margin: 4px 0; }
        .badge { display: inline-block; width: 8px; height: 8px; border-radius: 8px; margin-right: 6px; }
        .blue { background: #3b82f6; }
        .red { background: #ef4444; }
        hr { margin: 6px 0; border-color: #334155; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="compare" id="compareDiv">
    <div><b>Extrapolation +3s</b></div>
    <div class="row"><div><span class="badge blue"></span>Kalman</div><span id="errKal">-- m</span></div>
    <div class="row"><div><span class="badge red"></span>Polynomial</div><span id="errPoly">-- m</span></div>
    <hr>
    <div class="row"><div>Diff predictions:</div><span id="diffPred">-- m</span></div>
</div>

<div class="panel" id="info">
    <div><b id="coord">Waiting GPS</b></div>
    <div class="row"><span>Speed:</span><span id="speedVal">-- km/h</span></div>
    <div class="row"><span>Accuracy:</span><span id="accVal">-- m</span></div>
    <div class="row"><span>Points:</span><span id="ptCount">0</span></div>
</div>

<button class="btn" id="downloadBtn">Download CSV</button>

<script>
(function(){
    // ----- CANVAS -----
    const canvas = document.getElementById('canvas');
    let ctx = canvas.getContext('2d');
    let view = { lat: 59.9343, lon: 30.3351 };
    let zoom = 16;
    
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        draw();
    }
    
    function coordToCanvas(lat, lon) {
        const scale = Math.pow(2, zoom) * 2.2;
        const x = (lon - view.lon) * scale * Math.cos(view.lat * Math.PI/180) * 70 + canvas.width/2;
        const y = (view.lat - lat) * scale * 80 + canvas.height/2;
        return { x, y };
    }
    
    let historyLine = [];     // [[lat,lon]]
    let currentPos = { lat: 59.9343, lon: 30.3351 };
    let predKal = null;
    let predPoly = null;
    
    function draw() {
        if (!ctx) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // grid
        ctx.strokeStyle = "#1e293b";
        ctx.lineWidth = 0.5;
        for (let i = -4; i <= 4; i++) {
            let lonLine = view.lon + i * 0.002;
            let p1 = coordToCanvas(view.lat - 0.02, lonLine);
            let p2 = coordToCanvas(view.lat + 0.02, lonLine);
            ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
            let latLine = view.lat + i * 0.002;
            let p3 = coordToCanvas(latLine, view.lon - 0.02);
            let p4 = coordToCanvas(latLine, view.lon + 0.02);
            ctx.beginPath(); ctx.moveTo(p3.x, p3.y); ctx.lineTo(p4.x, p4.y); ctx.stroke();
        }
        
        // history track
        if (historyLine.length > 1) {
            ctx.beginPath();
            ctx.strokeStyle = "#3b82f6";
            ctx.lineWidth = 2.5;
            let first = coordToCanvas(historyLine[0][0], historyLine[0][1]);
            ctx.moveTo(first.x, first.y);
            for (let i=1; i<historyLine.length; i++) {
                let p = coordToCanvas(historyLine[i][0], historyLine[i][1]);
                ctx.lineTo(p.x, p.y);
            }
            ctx.stroke();
        }
        
        // prediction lines
        if (currentPos && predKal) {
            ctx.beginPath(); ctx.setLineDash([6,6]);
            ctx.strokeStyle = "#60a5fa"; ctx.lineWidth = 2;
            let from = coordToCanvas(currentPos.lat, currentPos.lon);
            let to = coordToCanvas(predKal.lat, predKal.lon);
            ctx.moveTo(from.x, from.y); ctx.lineTo(to.x, to.y); ctx.stroke();
        }
        if (currentPos && predPoly) {
            ctx.beginPath(); ctx.setLineDash([4,8]);
            ctx.strokeStyle = "#f87171"; ctx.lineWidth = 2;
            let from = coordToCanvas(currentPos.lat, currentPos.lon);
            let to = coordToCanvas(predPoly.lat, predPoly.lon);
            ctx.moveTo(from.x, from.y); ctx.lineTo(to.x, to.y); ctx.stroke();
        }
        ctx.setLineDash([]);
        
        // markers
        if (currentPos) {
            let p = coordToCanvas(currentPos.lat, currentPos.lon);
            ctx.beginPath(); ctx.arc(p.x, p.y, 7, 0, 2*Math.PI);
            ctx.fillStyle = "#3b82f6"; ctx.fill();
            ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, 2*Math.PI);
            ctx.fillStyle = "white"; ctx.fill();
        }
        if (predKal) {
            let p = coordToCanvas(predKal.lat, predKal.lon);
            ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, 2*Math.PI);
            ctx.fillStyle = "#3b82f6"; ctx.globalAlpha = 0.6; ctx.fill();
            ctx.globalAlpha = 1;
        }
        if (predPoly) {
            let p = coordToCanvas(predPoly.lat, predPoly.lon);
            ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, 2*Math.PI);
            ctx.fillStyle = "#ef4444"; ctx.globalAlpha = 0.6; ctx.fill();
            ctx.globalAlpha = 1;
        }
    }
    
    function setView(lat, lon) {
        view.lat = lat; view.lon = lon;
        resize();
    }
    window.addEventListener('resize', resize);
    
    // ----- Kalman Filter -----
    class Kalman {
        constructor() {
            this.lat=0; this.lon=0; this.vLat=0; this.vLon=0; this.P=1; this.ok=false;
        }
        predict(dt) { if(this.ok && dt>0) { this.lat+=this.vLat*dt; this.lon+=this.vLon*dt; this.P+=0.6*dt; } }
        update(lat, lon, dt, spd=null, hdg=null) {
            if(!this.ok) { this.lat=lat; this.lon=lon; this.ok=true; return; }
            if(spd && hdg && dt>0.05) {
                let vx = spd*Math.cos(hdg)/111111;
                let vy = spd*Math.sin(hdg)/(111111*Math.cos(this.lat*Math.PI/180));
                this.vLat = 0.7*this.vLat + 0.3*vx;
                this.vLon = 0.7*this.vLon + 0.3*vy;
            } else if(dt>0.1) {
                let nvx = (lat-this.lat)/dt, nvy = (lon-this.lon)/dt;
                this.vLat = 0.65*this.vLat + 0.35*nvx;
                this.vLon = 0.65*this.vLon + 0.35*nvy;
            }
            let K = this.P/(this.P+0.6);
            this.lat += K*(lat-this.lat);
            this.lon += K*(lon-this.lon);
            this.P *= (1-K);
        }
        extrapolate(sec) { return [this.lat+this.vLat*sec, this.lon+this.vLon*sec]; }
        get() { return {lat:this.lat, lon:this.lon}; }
    }
    
    // ----- Polynomial (quadratic) -----
    function fitQuadratic(points, targ) {
        if(points.length<2) return points.length?points[0].coord:0;
        if(points.length===2) {
            let slope = (points[1].coord-points[0].coord)/(points[1].t-points[0].t);
            return points[1].coord + slope*targ;
        }
        let sT4=0,sT3=0,sT2=0,sT1=0,sT0=points.length;
        let sYt2=0,sYt=0,sY=0;
        for(let p of points) {
            let t=p.t, y=p.coord, t2=t*t, t3=t2*t, t4=t3*t;
            sT4+=t4; sT3+=t3; sT2+=t2; sT1+=t;
            sYt2+=y*t2; sYt+=y*t; sY+=y;
        }
        let det = (a,b,c,d,e,f,g,h,i)=> a*(e*i-f*h)-b*(d*i-f*g)+c*(d*h-e*g);
        let A = [[sT4,sT3,sT2],[sT3,sT2,sT1],[sT2,sT1,sT0]];
        let B = [sYt2,sYt,sY];
        let D = det(A[0][0],A[0][1],A[0][2],A[1][0],A[1][1],A[1][2],A[2][0],A[2][1],A[2][2]);
        if(Math.abs(D)<1e-8) {
            let last=points[points.length-1], first=points[0];
            let slope = (last.coord-first.coord)/(last.t-first.t);
            return last.coord + slope*targ;
        }
        let Da = det(B[0],A[0][1],A[0][2],B[1],A[1][1],A[1][2],B[2],A[2][1],A[2][2]);
        let Db = det(A[0][0],B[0],A[0][2],A[1][0],B[1],A[1][2],A[2][0],B[2],A[2][2]);
        let Dc = det(A[0][0],A[0][1],B[0],A[1][0],A[1][1],B[1],A[2][0],A[2][1],B[2]);
        let a_coef=Da/D, b_coef=Db/D, c_coef=Dc/D;
        return a_coef*targ*targ + b_coef*targ + c_coef;
    }
    
    function polyExtrapolate(history, nowSec, horizon=3) {
        if(history.length<2) return null;
        let recent = history.slice(-12);
        let latPts=[], lonPts=[];
        for(let p of recent) {
            let dt = p.time - nowSec;
            latPts.push({t:dt, coord:p.lat});
            lonPts.push({t:dt, coord:p.lon});
        }
        return { lat: fitQuadratic(latPts, horizon), lon: fitQuadratic(lonPts, horizon) };
    }
    
    // ----- Helpers -----
    function dist(lat1,lon1,lat2,lon2) {
        const R=6371000, p1=lat1*Math.PI/180, p2=lat2*Math.PI/180;
        let dp=(lat2-lat1)*Math.PI/180, dl=(lon2-lon1)*Math.PI/180;
        let a=Math.sin(dp/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
        return R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    
    let kalman = new Kalman();
    let historyPoints = [];   // {lat,lon,time}
    let logData = [];
    let lastTime = null;
    let currentGps = null;
    const HORIZON = 3.0;
    
    function addLog(ts, lat, lon, spd, acc, kalLat, kalLon, polLat, polLon) {
        logData.push({
            time: new Date(ts*1000).toISOString(),
            lat, lon,
            speed: spd? (spd*3.6).toFixed(1): '',
            acc: acc? acc.toFixed(1): '',
            kalLat: kalLat??'', kalLon: kalLon??'',
            polLat: polLat??'', polLon: polLon??''
        });
    }
    
    function updateUIandCanvas() {
        if(currentPos) {
            document.getElementById('coord').innerHTML = `${currentPos.lat.toFixed(6)}, ${currentPos.lon.toFixed(6)}`;
            document.getElementById('ptCount').innerHTML = historyPoints.length;
        }
        draw();
    }
    
    function onPosition(pos) {
        let {latitude, longitude, speed, heading, accuracy} = pos.coords;
        let now = pos.timestamp/1000;
        let spdMps = (speed!=null)? speed : null;
        let hdgRad = (heading!=null && spdMps>0.2)? heading*Math.PI/180 : null;
        
        if(lastTime===null) {
            lastTime = now;
            kalman.update(latitude, longitude, 0.1, spdMps, hdgRad);
            currentPos = kalman.get();
            historyPoints.push({lat:currentPos.lat, lon:currentPos.lon, time:now});
            setView(currentPos.lat, currentPos.lon);
            updateUIandCanvas();
            addLog(now, currentPos.lat, currentPos.lon, spdMps, accuracy, null, null, null, null);
            return;
        }
        
        let dt = now - lastTime;
        if(dt<=0.01) return;
        lastTime = now;
        
        kalman.predict(dt);
        kalman.update(latitude, longitude, dt, spdMps, hdgRad);
        currentPos = kalman.get();
        historyPoints.push({lat:currentPos.lat, lon:currentPos.lon, time:now});
        if(historyPoints.length>40) historyPoints.shift();
        historyLine = historyPoints.map(p=>[p.lat, p.lon]);
        
        // predictions
        let [kLat, kLon] = kalman.extrapolate(HORIZON);
        predKal = {lat:kLat, lon:kLon};
        let polyPred = (historyPoints.length>=3) ? polyExtrapolate(historyPoints, now, HORIZON) : null;
        predPoly = polyPred;
        
        // error calculation (look back)
        let errK=null, errP=null;
        let targetT = now - HORIZON;
        for(let i=logData.length-1; i>=0; i--) {
            let e = logData[i];
            if(Math.abs(new Date(e.time).getTime()/1000 - targetT) < 0.3 && e.kalLat) {
                errK = dist(latitude, longitude, parseFloat(e.kalLat), parseFloat(e.kalLon));
                if(e.polLat) errP = dist(latitude, longitude, parseFloat(e.polLat), parseFloat(e.polLon));
                break;
            }
        }
        document.getElementById('errKal').innerHTML = (errK!=null)? errK.toFixed(1)+' m' : '-- m';
        document.getElementById('errPoly').innerHTML = (errP!=null && predPoly)? errP.toFixed(1)+' m' : (historyPoints.length>=3? '...' : '-- m');
        if(predKal && predPoly) {
            let diffD = dist(predKal.lat, predKal.lon, predPoly.lat, predPoly.lon);
            document.getElementById('diffPred').innerHTML = diffD.toFixed(1)+' m';
        } else document.getElementById('diffPred').innerHTML = '-- m';
        
        let speedKmh = spdMps ? (spdMps*3.6).toFixed(1) : '--';
        document.getElementById('speedVal').innerHTML = speedKmh+' km/h';
        document.getElementById('accVal').innerHTML = accuracy ? accuracy.toFixed(1)+' m' : '--';
        
        setView(currentPos.lat, currentPos.lon);
        updateUIandCanvas();
        
        addLog(now, currentPos.lat, currentPos.lon, spdMps, accuracy, kLat, kLon, 
               polyPred? polyPred.lat:null, polyPred? polyPred.lon:null);
    }
    
    function onError(e) {
        document.getElementById('coord').innerHTML = 'GPS error';
    }
    
    // CSV download
    document.getElementById('downloadBtn').onclick = () => {
        if(logData.length===0) return alert('No data');
        let rows = ['timestamp,lat,lon,speed_kmh,accuracy_m,kalman_lat,kalman_lon,poly_lat,poly_lon'];
        for(let d of logData) {
            rows.push(`${d.time},${d.lat},${d.lon},${d.speed},${d.acc},${d.kalLat},${d.kalLon},${d.polLat},${d.polLon}`);
        }
        let blob = new Blob([rows.join('\n')], {type:'text/csv'});
        let a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `gnss_${Date.now()}.csv`;
        a.click();
        URL.revokeObjectURL(a.href);
    };
    
    if(navigator.geolocation) {
        navigator.geolocation.watchPosition(onPosition, onError, {enableHighAccuracy:true, timeout:8000, maximumAge:0});
    } else {
        document.getElementById('coord').innerHTML = 'No geolocation';
    }
    resize();
})();
</script>
</body>
</html>
