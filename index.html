<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ГНСС Трекер + Экстраполяция</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { width: 100vw; height: 100vh; }
        #panel {
            position: fixed; bottom: 20px; left: 10px; right: 10px;
            background: rgba(0,0,0,0.85); color: #fff;
            padding: 12px 14px; border-radius: 10px;
            font-size: 14px; line-height: 1.6;
            z-index: 1000; max-width: 360px;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="panel">Поиск спутников...</div>
    <button id="downloadBtn" style="position:fixed;top:15px;right:15px;z-index:1001;padding:10px 16px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;">Скачать CSV</button>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>

        // ==================== 1. КАРТА ====================
        const map = L.map('map').setView([59.9343, 30.3351], 16);
        L.tileLayer('https://tile2.maps.2gis.com/tiles?x={x}&y={y}&z={z}', {maxZoom:19}).addTo(map);

        const markerGPS   = L.circleMarker([0,0], {radius:7, color:'#2563eb', fillOpacity:1}).addTo(map);
        const markerPred  = L.circleMarker([0,0], {radius:7, color:'#ef4444', fillOpacity:0.4}).addTo(map);
        const lineHistory = L.polyline([], {color:'#2563eb', weight:3, opacity:0.8}).addTo(map);
        const linePredict = L.polyline([], {color:'#ef4444', weight:2, dashArray:'6,6'}).addTo(map);

        const history = [];
        const log = [];   // [{time, lat, lon, speed, accuracy, predLat, predLon}, ...]


        // ==================== 2. ФИЛЬТР КАЛМАНА ====================
        class Kalman {
            constructor() {
                this.lat = 0; this.lon = 0;
                this.vLat = 0; this.vLon = 0;
                this.P = 1; this.ok = false;
            }
            predict(dt) {
                if (!this.ok) return;
                this.lat += this.vLat * dt;
                this.lon += this.vLon * dt;
                this.P += 1e-7 * dt;
            }
            update(gpsLat, gpsLon, dt) {
                if (!this.ok) { this.lat = gpsLat; this.lon = gpsLon; this.ok = true; return; }
                const nvLat = (gpsLat - this.lat) / dt;
                const nvLon = (gpsLon - this.lon) / dt;
                const K = this.P / (this.P + 1e-5);
                this.lat += K * (gpsLat - this.lat);
                this.lon += K * (gpsLon - this.lon);
                this.P *= (1 - K);
                this.vLat = 0.7 * this.vLat + 0.3 * nvLat;
                this.vLon = 0.7 * this.vLon + 0.3 * nvLon;
            }
            extrapolate(s) {
                return [this.lat + this.vLat * s, this.lon + this.vLon * s];
            }
        }

        const kf = new Kalman();
        let lastTime = null;


        // ==================== 3. ОБРАБОТКА ГНСС ====================
        function onPosition(pos) {
            const { latitude, longitude, speed, heading, accuracy } = pos.coords;
            const now = pos.timestamp / 1000;
            const ts = new Date(pos.timestamp).toISOString();

            if (lastTime === null) {
                lastTime = now;
                kf.lat = latitude; kf.lon = longitude; kf.ok = true;
                map.setView([latitude, longitude], 18);
                markerGPS.setLatLng([latitude, longitude]);
                updatePanel(latitude, longitude, speed, accuracy, 0);
                return;
            }

            const dt = now - lastTime;
            if (dt <= 0) return;
            lastTime = now;

            if (speed && heading) {
                const r = heading * Math.PI / 180;
                kf.vLat = 0.7 * kf.vLat + 0.3 * speed * Math.cos(r) / 111111;
                kf.vLon = 0.7 * kf.vLon + 0.3 * speed * Math.sin(r) / (111111 * Math.cos(latitude * Math.PI / 180));
            }

            kf.predict(dt);
            kf.update(latitude, longitude, dt);

            const [predLat, predLon] = kf.extrapolate(5);

            const dM = (predLat - kf.lat) * 111111;
            const dN = (predLon - kf.lon) * 111111 * Math.cos(kf.lat * Math.PI / 180);
            const dist = Math.sqrt(dM*dM + dN*dN);

            markerGPS.setLatLng([kf.lat, kf.lon]);
            markerPred.setLatLng([predLat, predLon]);

            history.push([kf.lat, kf.lon]);
            lineHistory.setLatLngs(history);
            linePredict.setLatLngs([[kf.lat, kf.lon], [predLat, predLon]]);

            log.push({
                time: ts,
                lat: kf.lat, lon: kf.lon,
                speed: speed, accuracy: accuracy,
                predLat: predLat, predLon: predLon
            });

            updatePanel(kf.lat, kf.lon, speed, accuracy, dist);
        }

        function onError(err) {
            document.getElementById('panel').innerHTML = 'Нет сигнала ГНСС. Выйдите на открытое место.';
        }

        function updatePanel(lat, lon, speed, accuracy, dist) {
            document.getElementById('panel').innerHTML =
                `Координаты: ${lat.toFixed(6)}, ${lon.toFixed(6)}<br>` +
                `Скорость: ${speed ? (speed*3.6).toFixed(1) : '--'} км/ч<br>` +
                `Точность: ${accuracy ? accuracy.toFixed(1) : '--'} м<br>` +
                `Прогноз +5 сек: ${dist.toFixed(1)} м<br>` +
                `Трек: ${log.length} точек`;
        }


        // ==================== 4. СКАЧИВАНИЕ CSV ====================
        document.getElementById('downloadBtn').addEventListener('click', () => {
            if (log.length === 0) { alert('Нет данных.'); return; }

            let csv = 'timestamp,lat,lon,speed_kmh,accuracy_m,pred_5s_lat,pred_5s_lon\n';
            log.forEach(e => {
                csv += `${e.time},${e.lat.toFixed(8)},${e.lon.toFixed(8)},` +
                       `${e.speed ? (e.speed*3.6).toFixed(2) : ''},` +
                       `${e.accuracy ? e.accuracy.toFixed(2) : ''},` +
                       `${e.predLat.toFixed(8)},${e.predLon.toFixed(8)}\n`;
            });

            const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `gnss_log_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        });


        // ==================== 5. ЗАПУСК ====================
        navigator.geolocation.watchPosition(onPosition, onError, {
            enableHighAccuracy: true,
            timeout: 30000,
            maximumAge: 0
        });

    </script>
</body>
</html>
