<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ГНСС Трекер + Экстраполяция</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { width: 100vw; height: 100vh; }
        #panel {
            position: fixed; bottom: 20px; left: 10px; right: 10px;
            background: rgba(0,0,0,0.85); color: white;
            padding: 12px; border-radius: 10px;
            font-size: 14px; z-index: 1000; max-width: 350px;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="panel">🔍 Поиск спутников...</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>

        // ========== 1. КАРТА ==========
        const map = L.map('map').setView([59.9343, 30.3351], 16); // СПб
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Маркеры
        const markerGPS    = L.circleMarker([0,0], {radius:7, color:'blue', fillOpacity:1}).addTo(map);
        const markerPred   = L.circleMarker([0,0], {radius:7, color:'red',  fillOpacity:0.4}).addTo(map);
        const lineHistory  = L.polyline([], {color:'blue'}).addTo(map);
        const linePredict  = L.polyline([], {color:'red', dashArray:'5,5'}).addTo(map);
        const history = [];


        // ========== 2. ФИЛЬТР КАЛМАНА (простая модель постоянной скорости) ==========
        class Kalman {
            constructor() {
                this.lat = 0;      // широта (градусы)
                this.lon = 0;      // долгота
                this.vLat = 0;     // скорость по широте (град/сек)
                this.vLon = 0;     // скорость по долготе
                this.P = 1;        // неопределённость
                this.ok = false;   // инициализирован?
            }

            // Предсказание на dt секунд вперёд
            predict(dt) {
                if (!this.ok) return;
                this.lat += this.vLat * dt;
                this.lon += this.vLon * dt;
                this.P += 0.0000001 * dt;   // растёт неопределённость
            }

            // Уточнение по измерению GPS
            update(gpsLat, gpsLon, dt) {
                if (!this.ok) {
                    this.lat = gpsLat;
                    this.lon = gpsLon;
                    this.ok = true;
                    return;
                }
                // Оцениваем скорость по смещению
                const newVLat = (gpsLat - this.lat) / dt;
                const newVLon = (gpsLon - this.lon) / dt;

                // Коэффициент Калмана: сколько доверяем измерению?
                const R = 0.00001;   // шум GPS (~1 метр в градусах)
                const K = this.P / (this.P + R);

                // Корректируем координаты
                this.lat += K * (gpsLat - this.lat);
                this.lon += K * (gpsLon - this.lon);
                this.P *= (1 - K);

                // Сглаживаем скорость (70% старая + 30% новая)
                this.vLat = 0.7 * this.vLat + 0.3 * newVLat;
                this.vLon = 0.7 * this.vLon + 0.3 * newVLon;
            }

            // Экстраполяция на seconds секунд вперёд
            extrapolate(seconds) {
                return [
                    this.lat + this.vLat * seconds,
                    this.lon + this.vLon * seconds
                ];
            }
        }

        const kf = new Kalman();
        let lastTime = null;


        // ========== 3. ПОЛУЧЕНИЕ ДАННЫХ ГНСС ==========
        function onPosition(pos) {
            const { latitude, longitude, speed, heading, accuracy } = pos.coords;
            const now = pos.timestamp / 1000;

            // Первый запуск — инициализация
            if (lastTime === null) {
                lastTime = now;
                kf.lat = latitude;
                kf.lon = longitude;
                kf.ok = true;
                map.setView([latitude, longitude], 18);
                markerGPS.setLatLng([latitude, longitude]);
                document.getElementById('panel').innerHTML = '✅ Позиция определена';
                return;
            }

            const dt = now - lastTime;
            if (dt <= 0) return;
            lastTime = now;

            // Если чип даёт скорость — используем для подсказки фильтру
            if (speed && heading) {
                const rad = heading * Math.PI / 180;
                kf.vLat = 0.7 * kf.vLat + 0.3 * speed * Math.cos(rad) / 111111;
                kf.vLon = 0.7 * kf.vLon + 0.3 * speed * Math.sin(rad) / (111111 * Math.cos(latitude * Math.PI / 180));
            }

            // Шаг 1: предсказание
            kf.predict(dt);

            // Шаг 2: коррекция по измерению
            kf.update(latitude, longitude, dt);

            // Шаг 3: экстраполяция на 5 секунд
            const [predLat, predLon] = kf.extrapolate(5);

            // Расчёт смещения прогноза в метрах
            const dLatM = (predLat - kf.lat) * 111111;
            const dLonM = (predLon - kf.lon) * 111111 * Math.cos(kf.lat * Math.PI / 180);
            const dist = Math.sqrt(dLatM*dLatM + dLonM*dLonM);

            // ========== 4. ОТРИСОВКА ==========
            markerGPS.setLatLng([kf.lat, kf.lon]);
            markerPred.setLatLng([predLat, predLon]);

            history.push([kf.lat, kf.lon]);
            if (history.length > 200) history.shift();
            lineHistory.setLatLngs(history);
            linePredict.setLatLngs([[kf.lat, kf.lon], [predLat, predLon]]);

            // Панель информации
            document.getElementById('panel').innerHTML = `
                📍 ${kf.lat.toFixed(6)}, ${kf.lon.toFixed(6)}<br>
                🚀 ${speed ? (speed*3.6).toFixed(1) : '?'} км/ч | Точность ±${accuracy?.toFixed(1) || '?'} м<br>
                🔮 Прогноз +5с: ${dist.toFixed(1)} м
            `;
        }

        function onError(err) {
            document.getElementById('panel').innerHTML = 
                '❌ Нет сигнала ГНСС. Выйдите на улицу и обновите страницу.';
        }

        // Запуск слежения
        navigator.geolocation.watchPosition(onPosition, onError, {
            enableHighAccuracy: true,
            timeout: 30000,
            maximumAge: 0
        });

    </script>
</body>
</html>
